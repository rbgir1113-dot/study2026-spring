<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원 수정 페이지</title>
</head>
<body>
    <form th:action="@{/member/login}" method="post" th:object="${memberVO}">
        <input type="hidden" th:field="*{id}" th:value="*{id}">
        <input type="text" th:field="*{memberEmail}" th:value="*{memberEmail}" placeholder="이메일을 입력해주세요">
        <input type="password" th:field="*{memberPassword}" th:value="*{memberPassword}" placeholder="비밀번호를 입력해주세요">
        <input type="text" th:field="*{memberName}" th:value="*{memberName}" placeholder="이름을 입력해주세요">
    <button type="button">수정완료</button>
</form>
</body>
</html>
