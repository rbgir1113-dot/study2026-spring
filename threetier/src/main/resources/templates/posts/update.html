<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>수정 페이지</title>
</head>
<body>
    <form th:action="@{/posts/update}" method="post" th:object="${posts}">
        <input type="hidden" th:field="*{id}" value="*{id}">
        <input type="text" th:field="*{postTitle}" th:value="*{postTitle}" placeholder="게시글 제목" />
        <input type="text" th:field="*{postContent}" th:value="*{postContent}" placeholder="게시글 내용" />
        <button type="button">게시글 수정</button>
    </form>
</body>

</html>
