<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 상세보기</title>
</head>
<body>
    <th:block th:object="${post}">
        <p th:text="*{postTitle}"></p>
        <p th:text="*{postContent}"></p>
        <p th:text="*{memberName}"></p>
        <button id="update">수정하기</button>
        <button id="delete">삭제하기</button>
    </th:block>
</body>
<script>
    const btn = document.querySelector("#update");
    btn.addEventListener("click", () => {
        const id = [[*{id}]];
        window.location.href = "/posts/update?id=" + id;
    });
    const btn2 = document.querySelector("#delete");
    btn2.addEventListener("click", () => {
        const id = [[*{id}]];
        window.location.href = "/posts/delete?id=" + id;
    });


</script>
</html>
