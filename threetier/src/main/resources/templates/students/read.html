<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>학생 등록 페이지</title>
</head>
<body>
    <div th:object="${student}">
        <div>
            <span>학생 이름</span>
            <span th:text="*{studentName} +'님' "></span>
        </div>
        <div>
            <span>국어 점수</span>
            <span th:text="*{studentKor} +'점'"></span>
        </div>
        <div>
            <span>영어 점수</span>
            <span th:text="*{studentEng} +'점'"></span>
        </div>
        <div>
            <span>수학 점수</span>
            <span th:text="*{studentMath}+'점'"></span>
        </div>
        <div>
            <span>총점</span>
            <span th:text="*{total}+'점'"></span>
        </div>
        <div>
            <span>평균</span>
            <span th:text="*{average}+'점'"></span>
        </div>
    </div>
</body>
</html>
