<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원 가입</title>
    <style>
        input {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<form th:action="@{/products/register}" method="post" th:object="${productVO}">
    <input type="text" th:field="*{productPrice}" placeholder="상품 가격" />
    <input type="text" th:field="*{productStock}" placeholder="상품 수량" />
    <input type="text" th:field="*{productName}" placeholder="상품명" />
    <input type="text" th:field="*{productBrand}" placeholder="상품 브랜드" />
    <button type="button">물품 추가</button>
</form>
</body>
<!-- 화면에서 받을 값이 있다면 반드시, 유효성 검사 실시-->
<script>
    const inputs = document.querySelectorAll("input");
    const btn = document.querySelector("button");
    const form = document.querySelector("form");

    btn.addEventListener('click', () => {
        for (let input of inputs) {
            if(!input.value) return alert(input.name + "값이 없습니다.");
        }
        form.submit();
    });
</script>
</html>
