<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>결과페이지</title>
</head>
<body>
    <form th:object="${task}">
        <p th:text="'국어 점수 : ' + *{taskKor}"></p>
        <p th:text="'영어 점수 : ' + *{taskEng}"></p>
        <p th:text="'수학 점수 : ' + *{taskMath}"></p>
        <p th:text="'총점 : ' + (*{taskKor} + *{taskEng} + *{taskMath})"></p>
        <p th:text="'평균 : ' + (*{taskKor} + *{taskEng} + *{taskMath}) / 3"></p>
    </form>
</body>
</html>
